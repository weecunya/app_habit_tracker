services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: habit-tracker-backend
    environment:
      JWT_KEY: ${JWT_KEY:?Set JWT_KEY in .env before deploy}
    expose:
      - "8000"
    volumes:
      - ./backend/applications.db:/app/applications.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/my-app
      dockerfile: Dockerfile
    container_name: habit-tracker-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
